services:
  # ── GUI mode: browser-based player at http://localhost:8765 ──
  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: music-dl
    ports:
      - "${MUSIC_DL_PORT:-8765}:8765"
    volumes:
      - ${MUSIC_DL_CONFIG:-~/.config/music-dl}:/root/.config/music-dl
      - ${MUSIC_DL_DOWNLOADS:-~/Music}:/root/download
    restart: unless-stopped

  # ── CLI mode: interactive commands (login, download, etc.) ──
  # Usage:
  #   docker compose -f docker/docker-compose.yml run --rm cli login
  #   docker compose -f docker/docker-compose.yml run --rm cli dl <URL>
  cli:
    image: music-dl
    depends_on:
      gui:
        condition: service_started
    entrypoint: ["music-dl"]
    volumes:
      - ${MUSIC_DL_CONFIG:-~/.config/music-dl}:/root/.config/music-dl
      - ${MUSIC_DL_DOWNLOADS:-~/Music}:/root/download
    stdin_open: true
    tty: true
    profiles: ["cli"]
