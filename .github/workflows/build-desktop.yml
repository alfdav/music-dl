name: build-desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: tidaldl-py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps (Linux only) ─────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libgtk-3-dev libayatana-appindicator3-dev \
            ffmpeg

      # ── Bun (for Tauri CLI via bunx) ─────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Python + PyInstaller sidecar ─────────────────────────────
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Create venv and install deps
        run: uv sync --extra test --extra build

      # ── Rust + Tauri ─────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tidaldl-py/src-tauri -> target

      - name: Build PyInstaller sidecar (Linux)
        if: runner.os == 'Linux'
        run: |
          TARGET_TRIPLE=$(rustc --print host-tuple)
          .venv/bin/pyinstaller --clean \
            --distpath src-tauri/binaries \
            --workpath build/pyinstaller \
            --noconfirm \
            build/pyinstaller/music-dl-server.spec
          mv src-tauri/binaries/music-dl-server \
             src-tauri/binaries/music-dl-server-${TARGET_TRIPLE}

      - name: Build PyInstaller sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TargetTriple = rustc --print host-tuple
          uv run pyinstaller --clean `
            --distpath src-tauri/binaries `
            --workpath build/pyinstaller `
            --noconfirm `
            build/pyinstaller/music-dl-server.spec
          Move-Item `
            -Path "src-tauri/binaries/music-dl-server.exe" `
            -Destination "src-tauri/binaries/music-dl-server-$TargetTriple.exe" `
            -Force

      - name: Verify bundled assets (Linux)
        if: runner.os == 'Linux'
        run: |
          .venv/bin/python -c "
          from pathlib import Path
          js = Path('tidal_dl/gui/static/app.js').read_text(encoding='utf-8')
          assert 'mediaSession' in js, 'STALE JS: mediaSession missing'
          assert '_wfHires' in js, 'STALE JS: waveform hires missing'
          print('[verify] Static assets OK')
          "

      - name: Verify bundled assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv run python -c "from pathlib import Path; js = Path('tidal_dl/gui/static/app.js').read_text(encoding='utf-8'); assert 'mediaSession' in js, 'STALE JS: mediaSession missing'; assert '_wfHires' in js, 'STALE JS: waveform hires missing'; print('[verify] Static assets OK')"

      - name: Smoke test Windows sidecar
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:MUSIC_DL_CONFIG_DIR = Join-Path $env:RUNNER_TEMP "music-dl-config"
          New-Item -ItemType Directory -Force -Path $env:MUSIC_DL_CONFIG_DIR | Out-Null
          $MetadataPath = Join-Path $env:MUSIC_DL_CONFIG_DIR "daemon.json"
          $Sidecar = Get-ChildItem "src-tauri/binaries/music-dl-server-*.exe" | Select-Object -First 1
          $Process = Start-Process -FilePath $Sidecar.FullName -ArgumentList "8765" -PassThru
          try {
            $Ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                if (-not (Test-Path $MetadataPath)) {
                  Start-Sleep -Seconds 1
                  continue
                }
                $Metadata = Get-Content $MetadataPath -Raw | ConvertFrom-Json
                $Health = Invoke-RestMethod -Uri $Metadata.health_url -TimeoutSec 2
                if ($Health.app -eq "music-dl" -and $Health.status -eq "ready") {
                  $Ready = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $Ready) {
              throw "Windows sidecar did not become ready"
            }
          } finally {
            Stop-Process -Id $Process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install Tauri dependencies
        run: bun install

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        run: bunx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        run: bunx tauri build --target ${{ matrix.target }} --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (Windows MSI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: bunx tauri build --target ${{ matrix.target }} --bundles msi --config src-tauri/tauri.ci.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Upload artifacts ─────────────────────────────────────────
      - name: Upload Linux desktop artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: music-dl-${{ matrix.label }}
          path: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload macOS desktop artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: music-dl-${{ matrix.label }}
          path: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows desktop artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: music-dl-${{ matrix.label }}
          path: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
          if-no-files-found: error

      # ── Attach to release if tagged ──────────────────────────────
      - name: Upload Linux assets to release
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload macOS assets to release
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI to release
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tidaldl-py/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig

  publish-manifest:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      # Needed so the "Generate release notes" step can read
      # docs/release/install-instructions.md. Each job runs on its own
      # runner — the build job's checkout isn't visible here.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          PREV_TAG=$(gh release list \
            --repo "$REPO" \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 20 \
            --json tagName \
            --jq "map(select(.tagName != \"$TAG\"))[0].tagName")

          if [ -n "${PREV_TAG}" ] && [ "${PREV_TAG}" != "null" ]; then
            gh api "repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f previous_tag_name="$PREV_TAG" > release-notes.json
          else
            gh api "repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" > release-notes.json
          fi

          jq -r '.body' release-notes.json > RELEASE_NOTES.md

          # Always append the install instructions so every release
          # tells users how to get music-dl on macOS and Linux.
          INSTALL_BLOCK="${GITHUB_WORKSPACE}/docs/release/install-instructions.md"
          if [ ! -f "$INSTALL_BLOCK" ]; then
            echo "::error::Install instructions missing at $INSTALL_BLOCK"
            exit 1
          fi
          printf '\n' >> RELEASE_NOTES.md
          cat "$INSTALL_BLOCK" >> RELEASE_NOTES.md

          TRIMMED_NOTES=$(tr -d '[:space:]' < RELEASE_NOTES.md)
          if [ -z "$TRIMMED_NOTES" ] || [ "$TRIMMED_NOTES" = "null" ]; then
            echo "::error::Generated release notes were empty"
            exit 1
          fi

          echo "Generated release notes:"
          cat RELEASE_NOTES.md

      - name: Generate latest.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          find artifacts/ -type f | sort

          python scripts/edge_channel.py manifest \
            --artifacts-dir artifacts \
            --version "$TAG" \
            --base-url "$BASE_URL" \
            --notes "$(cat RELEASE_NOTES.md)" \
            --output latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json

      - name: Apply release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --notes-file RELEASE_NOTES.md
