<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="__CSRF_TOKEN__">
<title>music-dl</title>
<link rel="stylesheet" href="/fonts.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<noscript><p style="padding:2rem;color:#f0ebe4">JavaScript is required to use music-dl.</p></noscript>

<div class="ambient"></div>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="logo">
      <div class="logo-mark">&#9835;</div>
      <div class="logo-text">music-dl</div>
    </div>

    <div class="nav-label">Browse</div>
    <div class="nav-item active" data-view="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </div>
    <div class="nav-item" data-view="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      Search
    </div>
    <div class="nav-item" data-view="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Library
    </div>
    <div class="nav-item" data-view="recent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Recently Played
    </div>
    <div class="nav-item" data-view="playlists">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg>
      Playlists
    </div>
    <div class="nav-item" data-view="favorites">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorites
    </div>

    <div class="nav-label">Activity</div>
    <div class="nav-item" data-view="downloads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Downloads
      <span class="nav-badge" id="dl-badge" style="display:none;">0</span>
    </div>

    <div class="nav-label">Lab</div>
    <div class="nav-item" data-view="djai">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 2a4 4 0 0 1 4 4v4a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      DJAI
      <span class="nav-badge" style="background:var(--accent);font-size:.55rem;padding:1px 5px;">soon</span>
    </div>

    <div class="sidebar-bottom">
      <div class="nav-item" data-view="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        Settings
      </div>
      <div class="nav-item" id="nav-sync-library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Sync Library
      </div>
      <div class="connection" id="connection-tidal" style="cursor:pointer;">
        <span class="connection-dot"></span>
        tidal
      </div>
      <div class="connection" id="connection-hifi">
        <span class="connection-dot"></span>
        tidal-servers
      </div>
      <div class="shortcuts-hint" onclick="toggleShortcutsHelp()">? for shortcuts</div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div id="view"></div>
  </main>
</div>

<!-- QUEUE PANEL -->
<aside class="queue-panel" id="queue-panel" aria-label="Play queue">
  <div class="queue-header">
    <h3 class="queue-title">Queue</h3>
    <button class="queue-close" id="queue-close" aria-label="Close queue">&times;</button>
  </div>
  <div class="queue-list" id="queue-list"></div>
</aside>

<!-- PLAYER BAR -->
<footer class="player" role="region" aria-label="Audio player">
  <div class="now-playing" id="now-playing">
    <div class="now-art idle-art" id="now-art">
      <div class="art-gradient" style="background:linear-gradient(145deg, #2a1f14, #3d2e1a, #1a1510);"></div>
      <div class="idle-note">&#9835;</div>
    </div>
    <div class="now-info">
      <div class="now-title idle-clickable" id="now-title" title="I'm feeling lucky">Pick something to play</div>
      <div class="now-sub-row">
        <span class="now-sub" id="now-sub">music-dl</span>
        <span class="quality-tag" id="now-quality" style="display:none;"></span>
      </div>
    </div>
  </div>

  <div class="transport">
    <div class="controls">
      <button class="ctrl" id="btn-shuffle" title="Shuffle" aria-label="Shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="ctrl" id="btn-prev" title="Previous" aria-label="Previous track">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="ctrl-play" id="btn-play" title="Play" aria-label="Play/Pause">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" id="play-icon" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" id="btn-next" title="Next" aria-label="Next track">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ctrl" id="btn-repeat" title="Repeat" aria-label="Repeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="progress">
      <span class="progress-time" id="time-elapsed">0:00</span>
      <div class="progress-bar" id="progress-bar" role="slider" aria-label="Track progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="waveform" id="waveform"></div>
        <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
      </div>
      <span class="progress-time" id="time-total">0:00</span>
    </div>
  </div>

  <div class="volume-area">
    <button class="vol-btn" id="btn-vol" title="Volume" aria-label="Volume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <div class="vol-slider" id="vol-slider" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
      <div class="vol-fill" id="vol-fill" style="width:70%;"></div>
    </div>
    <button class="queue-toggle" id="btn-queue" title="Queue" aria-label="Queue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
</footer>

<audio id="audio" preload="none"></audio>
<script src="/app.js"></script>
</body>
</html>
