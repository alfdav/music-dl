services:
  tidal-dl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tidal-dl
    # Pass a command after the service name:
    #   docker compose -f docker/docker-compose.yml run --rm tidal-dl <URL>
    #   docker compose -f docker/docker-compose.yml run --rm tidal-dl login
    volumes:
      # Persists credentials, settings, and the ISRC duplicate index.
      # Replace the left-hand path with a folder of your choice.
      - ${TIDAL_CONFIG:-~/.config/tidal-dl}:/root/.config/tidal-dl
      # Downloaded files land here. Override with TIDAL_DOWNLOADS env var.
      - ${TIDAL_DOWNLOADS:-~/tidal-downloads}:/root/download
    # stdin_open + tty are needed for interactive commands such as `tidal-dl login`
    # (opens a browser link). Remove them for non-interactive / headless runs.
    stdin_open: true
    tty: true
