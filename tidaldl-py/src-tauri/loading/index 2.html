<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music-dl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #e0e0e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .text {
      font-size: 15px;
      letter-spacing: 0.5px;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }
    .text.fade { opacity: 0; }
    .error {
      color: #ff6b6b;
      font-size: 13px;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="text" id="status">Loading music-dl...</div>
  <div class="error" id="error"></div>
  <script>
    var phrases = [
      "Tuning the frequencies...",
      "Warming up the vacuum tubes...",
      "Polishing the vinyl...",
      "Rewinding the cassette...",
      "Dropping the needle...",
      "Calibrating the subwoofer...",
      "Untangling the headphone cable...",
      "Blowing into the cartridge...",
      "Adjusting the tracking force...",
      "Flipping to side B...",
      "Cuing up the next track...",
      "Syncing the turntables...",
      "Loading the 8-track...",
      "Degaussing the tape heads...",
      "Almost there, hang tight...",
    ];
    var el = document.getElementById('status');
    var idx = 0;
    // Shuffle so it's different each launch
    for (var i = phrases.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = phrases[i]; phrases[i] = phrases[j]; phrases[j] = tmp;
    }
    setInterval(function() {
      el.classList.add('fade');
      setTimeout(function() {
        idx = (idx + 1) % phrases.length;
        el.textContent = phrases[idx];
        el.classList.remove('fade');
      }, 300);
    }, 2500);
  </script>
</body>
</html>
