services:
  # ── GUI mode: browser-based player at http://localhost:8765 ──
  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: music-dl
    ports:
      # Localhost only by default — safe on shared networks.
      # To expose on LAN: MUSIC_DL_HOST=0.0.0.0 docker compose up
      - "${MUSIC_DL_HOST:-127.0.0.1}:${MUSIC_DL_PORT:-8765}:8765"
    volumes:
      - ${MUSIC_DL_CONFIG:-~/.config/music-dl}:/home/musicdl/.config/music-dl
      - ${MUSIC_DL_DOWNLOADS:-~/Music}:/home/musicdl/download
    restart: unless-stopped

  # ── CLI mode: interactive commands (login, download, etc.) ──
  # Usage:
  #   docker compose -f docker/docker-compose.yml run --rm cli login
  #   docker compose -f docker/docker-compose.yml run --rm cli dl <URL>
  cli:
    image: music-dl
    depends_on:
      gui:
        condition: service_started
    entrypoint: ["music-dl"]
    volumes:
      - ${MUSIC_DL_CONFIG:-~/.config/music-dl}:/home/musicdl/.config/music-dl
      - ${MUSIC_DL_DOWNLOADS:-~/Music}:/home/musicdl/download
    stdin_open: true
    tty: true
    profiles: ["cli"]
